<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 4 - Ferretería La Mixteca</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1b2a4a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .tarjeta {
            background-color: #ffffff;
            color: #2c2c2c;
            border-radius: 8px;
            max-width: 520px;
            width: 100%;
            padding: 35px 30px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1b2a4a;
            font-size: 1.5rem;
            margin-bottom: 6px;
        }
        p.desc {
            color: #555;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }
        .enlaces {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .enlaces a {
            display: block;
            text-decoration: none;
            padding: 16px;
            border-radius: 5px;
            font-weight: 600;
            color: #fff;
            transition: opacity 0.2s ease;
        }
        .enlaces a:hover { opacity: 0.85; }
        .btn-nativo { background-color: #e8702a; }
        .btn-bootstrap { background-color: #1b2a4a; border: 2px solid #1b2a4a; }
        footer {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="tarjeta">
        <h1>Práctica 4: Maquetación Web</h1>
        <p class="desc">Desarrollo Full Stack &mdash; Unidad 2 &mdash; ITSAO</p>

        <div class="enlaces">
            <a class="btn-nativo" href="nativo/indexDos.html">
                Ver versión HTML5 + CSS nativo
            </a>
            <a class="btn-bootstrap" href="bootstrap/indesBoststrap.html">
                Ver versión con Bootstrap
            </a>
        </div>

        <footer>Instituto Tecnológico Superior de Acatlán de Osorio</footer>
    </div>
</body>
</html>
